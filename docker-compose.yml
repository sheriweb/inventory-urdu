# Optional MySQL 8 for local dev when MAMP is not used.
# Default local database: MAMP MySQL on port 8889 (see .env.example).
services:
  mysql:
    image: mysql:8.0
    container_name: inventory-urdu-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-inventory_urdu_db}
    ports:
      - "3307:3306"
    volumes:
      - mysqldata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysqldata:
    driver: local
