name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Check GitHub secrets
        run: |
          SERVER="${{ secrets.FTP_SERVER }}"
          [ -z "$SERVER" ] && SERVER="${{ secrets.FTP_HOST }}"
          USER="${{ secrets.FTP_USERNAME }}"
          [ -z "$USER" ] && USER="${{ secrets.FTP_USER }}"
          PASS="${{ secrets.FTP_PASSWORD }}"
          if [ -z "$SERVER" ] || [ -z "$USER" ] || [ -z "$PASS" ]; then
            echo "❌ FTP secrets missing. GitHub → Settings → Secrets → Actions:"
            echo "   FTP_SERVER (ya FTP_HOST)"
            echo "   FTP_USERNAME (ya FTP_USER)"
            echo "   FTP_PASSWORD"
            exit 1
          fi
          echo "✅ FTP secrets found"

      - name: Install & build
        run: |
          npm ci
          npm run hostinger:build

      - name: Prepare FTP upload folder
        run: bash scripts/prepare-ftp-deploy.sh

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER || secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME || secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: ./deploy-output/
          server-dir: ./
          dangerous-clean-slate: false

      - name: Trigger Hostinger Node.js build (optional)
        continue-on-error: true
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
          HOSTINGER_DOMAIN: ${{ secrets.HOSTINGER_DOMAIN }}
        run: |
          if [ -z "${HOSTINGER_API_TOKEN:-}" ]; then
            echo "HOSTINGER_API_TOKEN not set — FTP upload only."
            exit 0
          fi
          bash scripts/create-deploy-zip.sh
          npm install axios tus-js-client
          node scripts/hostinger-deploy.mjs
