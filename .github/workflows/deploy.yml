name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Check GitHub secrets
        run: |
          API="${{ secrets.HOSTINGER_API_TOKEN }}"
          SERVER="${{ secrets.FTP_SERVER }}"
          [ -z "$SERVER" ] && SERVER="${{ secrets.FTP_HOST }}"
          USER="${{ secrets.FTP_USERNAME }}"
          [ -z "$USER" ] && USER="${{ secrets.FTP_USER }}"
          PASS="${{ secrets.FTP_PASSWORD }}"
          if [ -n "$API" ]; then echo "✅ Hostinger API token set"; fi
          if [ -n "$SERVER" ] && [ -n "$USER" ] && [ -n "$PASS" ]; then echo "✅ FTP secrets set"; fi
          if [ -z "$API" ] && { [ -z "$SERVER" ] || [ -z "$USER" ] || [ -z "$PASS" ]; }; then
            echo "❌ Add FTP secrets OR HOSTINGER_API_TOKEN"
            exit 1
          fi

      - name: Install & build
        run: |
          npm ci
          npm run hostinger:build

      - name: Prepare FTP upload folder
        run: bash scripts/prepare-ftp-deploy.sh

      # Hostinger API pehle (GitHub Actions se FTP aksar timeout — API HTTPS se chalta hai)
      - name: Deploy via Hostinger API
        continue-on-error: true
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
          HOSTINGER_DOMAIN: ${{ secrets.HOSTINGER_DOMAIN }}
        run: |
          if [ -z "${HOSTINGER_API_TOKEN:-}" ]; then
            echo "HOSTINGER_API_TOKEN not set — skip API deploy."
            exit 0
          fi
          bash scripts/create-deploy-zip.sh
          npm install axios tus-js-client
          node scripts/hostinger-deploy.mjs

      - name: Deploy via FTP (FTPS)
        continue-on-error: true
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER || secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USERNAME || secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          security: loose
          timeout: 120000
          local-dir: ./deploy-output/
          server-dir: ./
          dangerous-clean-slate: false

      - name: Deploy result
        run: |
          echo "Agar dono fail hon to GitHub mein HOSTINGER_API_TOKEN add karein."
          echo "Ya hPanel → Node.js → Import Git (sab se aasaan)."
