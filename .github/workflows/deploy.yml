name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create source archive
        run: bash scripts/create-deploy-zip.sh

      - name: Install deploy dependencies
        run: npm install axios tus-js-client

      - name: Deploy to Hostinger (Node.js API)
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
          HOSTINGER_DOMAIN: ${{ secrets.HOSTINGER_DOMAIN }}
        run: node scripts/hostinger-deploy.mjs
