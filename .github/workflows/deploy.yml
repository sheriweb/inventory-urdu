name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    # Sirf tab chale jab Hostinger API token ho — warna self-hosted workflow use karein
    if: ${{ secrets.HOSTINGER_API_TOKEN != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Check GitHub secrets
        run: |
          API="${{ secrets.HOSTINGER_API_TOKEN }}"
          SERVER="${{ secrets.FTP_SERVER }}"
          [ -z "$SERVER" ] && SERVER="${{ secrets.FTP_HOST }}"
          USER="${{ secrets.FTP_USERNAME }}"
          [ -z "$USER" ] && USER="${{ secrets.FTP_USER }}"
          PASS="${{ secrets.FTP_PASSWORD }}"
          if [ -n "$API" ]; then echo "✅ Hostinger API token set"; fi
          if [ -n "$SERVER" ] && [ -n "$USER" ] && [ -n "$PASS" ]; then echo "✅ FTP secrets set"; fi
          if [ -z "$API" ] && { [ -z "$SERVER" ] || [ -z "$USER" ] || [ -z "$PASS" ]; }; then
            echo "❌ Add FTP secrets OR HOSTINGER_API_TOKEN"
            exit 1
          fi

      - name: Install & build
        run: |
          npm ci
          npm run hostinger:build

      - name: Prepare FTP upload folder
        run: bash scripts/prepare-ftp-deploy.sh

      # Hostinger API — GitHub Actions se FTP port 21 block hota hai; API HTTPS se chalti hai
      - name: Deploy via Hostinger API
        id: api_deploy
        continue-on-error: true
        env:
          HOSTINGER_API_TOKEN: ${{ secrets.HOSTINGER_API_TOKEN }}
          HOSTINGER_DOMAIN: ${{ secrets.HOSTINGER_DOMAIN }}
        run: |
          if [ -z "${HOSTINGER_API_TOKEN:-}" ] || [ -z "${HOSTINGER_DOMAIN:-}" ]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "HOSTINGER_API_TOKEN / HOSTINGER_DOMAIN not set — skip API deploy."
            exit 0
          fi
          bash scripts/create-deploy-zip.sh
          npm install axios tus-js-client
          node scripts/hostinger-deploy.mjs
          echo "success=true" >> "$GITHUB_OUTPUT"

      - name: Deploy complete
        run: echo "✅ Deployed via Hostinger API"
