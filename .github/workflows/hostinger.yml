# DISABLED on push — hPanel Git auto-deploy is primary (resource limits on shared hosting).
# Run manually from GitHub Actions tab only when needed.

name: Hostinger Deploy

on:
  workflow_dispatch:

concurrency:
  group: hostinger-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build
        env:
          HOSTINGER_COMBINED: '1'
          INTERNAL_API_URL: http://127.0.0.1:4001
          NEXT_PUBLIC_API_URL: https://qistpro.shop/api/v1
        run: npm run hostinger:build

      - name: Install sshpass & rsync
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass rsync

      - name: Upload to Hostinger & restart
        env:
          SKIP_LOCAL_BUILD: '1'
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SSH_REMOTE_PATH: ${{ secrets.SSH_REMOTE_PATH }}
          RUN_DB_SETUP: '0'
        run: bash scripts/deploy-hostinger-ssh.sh
