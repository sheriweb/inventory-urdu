# Auto deploy on git push — SSH (no Hostinger API token needed).
# GitHub cloud runner → build → rsync → prisma db push → restart.
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   SSH_HOST, SSH_PORT, SSH_USER, SSH_PASSWORD, DATABASE_URL

name: Deploy to Hostinger (SSH)

on:
  workflow_dispatch:

concurrency:
  group: deploy-hostinger-ssh
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install sshpass & rsync
        run: sudo apt-get update -qq && sudo apt-get install -y -qq sshpass rsync

      - name: Build, upload, DB sync, restart
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || '65002' }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SSH_REMOTE_PATH: ${{ secrets.SSH_REMOTE_PATH }}
          SKIP_BUILD: '0'
        run: |
          for v in SSH_HOST SSH_USER SSH_PASSWORD DATABASE_URL; do
            if [ -z "${!v:-}" ]; then
              echo "❌ Missing GitHub secret: $v"
              exit 1
            fi
          done
          bash scripts/deploy-via-ssh.sh
