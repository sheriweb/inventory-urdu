# leasing-store.com — git push → build → FTP deploy.
# Secrets (already set): LEASING_FTP_PASSWORD, LEASING_PRODUCTION_ENV

name: Deploy leasing-store.com

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-leasing-store
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Write production env
        env:
          LEASING_PRODUCTION_ENV: ${{ secrets.LEASING_PRODUCTION_ENV }}
        run: |
          if [ -z "${LEASING_PRODUCTION_ENV}" ]; then
            echo "❌ Missing secret: LEASING_PRODUCTION_ENV"
            exit 1
          fi
          mkdir -p deploy
          printf '%s\n' "${LEASING_PRODUCTION_ENV}" > deploy/leasing-store-production.env

      - name: Build
        env:
          NPM_CONFIG_PRODUCTION: 'false'
        run: |
          export $(grep -v '^#' deploy/leasing-store-production.env | grep -v '^$' | xargs)
          export HOSTINGER_COMBINED=1
          export INTERNAL_API_URL=http://127.0.0.1:4001
          npm ci --no-audit --no-fund
          npm run hostinger:build

      - name: Prepare deploy bundles
        run: |
          npm prune --omit=dev
          bash scripts/prepare-fast-deploy.sh
          bash scripts/prepare-flat-node-modules.sh

      - name: Detect dependency changes
        id: deps
        run: |
          # Symlink-safe flat upload needed after package*.json changes or manual full deploy.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "upload_nm=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only HEAD^ HEAD | grep -qE '^(package(-lock)?\.json|apps/.+/package\.json|packages/.+/package\.json)$'; then
            echo "upload_nm=true" >> "$GITHUB_OUTPUT"
          else
            echo "upload_nm=false" >> "$GITHUB_OUTPUT"
          fi
          # One-time: re-upload flat nm after symlink FTP fix (remove next line after site is live).
          echo "upload_nm=true" >> "$GITHUB_OUTPUT"

      - name: FTP upload app files
        env:
          FTP_PASS: ${{ secrets.LEASING_FTP_PASSWORD }}
        run: |
          if [ -z "${FTP_PASS}" ]; then
            echo "❌ Missing secret: LEASING_FTP_PASSWORD"
            exit 1
          fi
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp rsync
          WS="$GITHUB_WORKSPACE"
          lftp -u "deploy@leasing-store.com","${FTP_PASS}" "ftp://leasing-store.com:21" <<EOF
          set ftp:ssl-allow true
          set ssl:verify-certificate no
          set net:timeout 90
          set net:max-retries 5
          set mirror:parallel-transfer-count 4
          cd inventory-urdu
          rm -f .maintenance
          lcd ${WS}/deploy-fast
          mirror -R --parallel=4 .
          bye
          EOF
          echo "✅ App files uploaded"

      - name: FTP upload runtime node_modules
        if: steps.deps.outputs.upload_nm == 'true'
        env:
          FTP_PASS: ${{ secrets.LEASING_FTP_PASSWORD }}
        run: |
          WS="$GITHUB_WORKSPACE"
          NM="${WS}/deploy-flat/node_modules"
          echo "Upload size: $(du -sh "$NM" | cut -f1)"
          lftp -u "deploy@leasing-store.com","${FTP_PASS}" "ftp://leasing-store.com:21" <<EOF
          set ftp:ssl-allow true
          set ssl:verify-certificate no
          set ftp:passive-mode true
          set net:timeout 180
          set net:max-retries 10
          set mirror:parallel-transfer-count 2
          set cmd:fail-exit no
          cd nodevenv/inventory-urdu/20/lib/node_modules
          lcd ${NM}
          mirror -R --parallel=2 next @next react react-dom
          mirror -R --parallel=2 @prisma @nestjs
          mirror -R --parallel=2 .
          bye
          EOF
          echo "✅ Runtime node_modules uploaded"

      - name: Done
        run: echo "✅ Deploy complete — site should update within 1 minute"
