# leasing-store.com — git push → build → FTP deploy.
# node_modules is shipped as ONE node_modules.tar.gz (FTP-safe), extracted on the server at boot.
# Secrets (already set): LEASING_FTP_PASSWORD, LEASING_PRODUCTION_ENV

name: Deploy leasing-store.com

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-leasing-store
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Write production env
        env:
          LEASING_PRODUCTION_ENV: ${{ secrets.LEASING_PRODUCTION_ENV }}
        run: |
          if [ -z "${LEASING_PRODUCTION_ENV}" ]; then
            echo "❌ Missing secret: LEASING_PRODUCTION_ENV"
            exit 1
          fi
          mkdir -p deploy
          printf '%s\n' "${LEASING_PRODUCTION_ENV}" > deploy/leasing-store-production.env

      - name: Build
        env:
          NPM_CONFIG_PRODUCTION: 'false'
        run: |
          export $(grep -v '^#' deploy/leasing-store-production.env | grep -v '^$' | xargs)
          export HOSTINGER_COMBINED=1
          export INTERNAL_API_URL=http://127.0.0.1:4001
          npm ci --no-audit --no-fund
          npm run hostinger:build

      - name: Package app + node_modules tarball
        run: |
          npm prune --omit=dev
          bash scripts/prepare-fast-deploy.sh
          bash scripts/prepare-flat-node-modules.sh
          tar -czf deploy-fast/node_modules.tar.gz -C deploy-flat/node_modules .
          echo "Bundle contents:"
          du -sh deploy-fast deploy-fast/node_modules.tar.gz

      - name: FTP upload (single mirror — app files + one tarball)
        env:
          FTP_PASS: ${{ secrets.LEASING_FTP_PASSWORD }}
        run: |
          if [ -z "${FTP_PASS}" ]; then
            echo "❌ Missing secret: LEASING_FTP_PASSWORD"
            exit 1
          fi
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          WS="$GITHUB_WORKSPACE"
          lftp -u "deploy@leasing-store.com","${FTP_PASS}" "ftp://leasing-store.com:21" <<EOF
          set ftp:ssl-allow true
          set ssl:verify-certificate no
          set ftp:passive-mode true
          set net:timeout 120
          set net:max-retries 10
          set net:reconnect-interval-base 5
          set xfer:clobber on
          set mirror:parallel-transfer-count 3
          set cmd:fail-exit yes
          cd inventory-urdu
          rm -f .maintenance
          rm -f node_modules/.tarball-stamp
          lcd ${WS}/deploy-fast
          mirror -R --parallel=3 .
          bye
          EOF
          echo "✅ Uploaded. Server will extract node_modules.tar.gz on next boot."

      - name: Trigger app restart
        env:
          FTP_PASS: ${{ secrets.LEASING_FTP_PASSWORD }}
        run: |
          lftp -u "deploy@leasing-store.com","${FTP_PASS}" "ftp://leasing-store.com:21" <<'EOF'
          set ftp:ssl-allow true
          set ssl:verify-certificate no
          cd inventory-urdu/tmp
          put -O . /dev/null -o restart.txt
          bye
          EOF
          echo "✅ restart.txt touched — Passenger will reboot the app"
